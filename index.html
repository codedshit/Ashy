<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ash's Cavern</title>
    <link rel="icon" type="image/gif" href="6efe8a79d1667544b478964c52e05982.gif">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @font-face {
            font-family: 'ElegantTypewriter';
            src: url('ELEGANT TYPEWRITER Regular.ttf') format('truetype');
        }
        @font-face {
            font-family: 'ElegantTypewriterBold';
            src: url('ELEGANT TYPEWRITER Bold.ttf') format('truetype');
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'ElegantTypewriter', sans-serif; overflow-x: hidden; background: transparent !important; }
        
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -999; object-fit: cover; }
        
        #play-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.6); color: white; display: flex; 
            justify-content: center; align-items: center; z-index: 9999; 
            cursor: pointer; transition: opacity 0.8s ease; 
            font-family: 'ElegantTypewriter', sans-serif; font-size: 24px;
        }
        
        .container { display: flex; justify-content: center; align-items: center; min-height: 85vh; padding: 20px; }
        .card { background: rgba(0, 0, 0, 0.2); padding: 25px; border-radius: 20px; text-align: center; color: #bf0000; width: 100%; max-width: 300px; }
        
        .bio { 
            font-family: 'ElegantTypewriter', monospace; font-size: 16px; 
            color: #bf0000; min-height: 3em; margin: 15px 0; font-weight: bold;
        }
        
        .links a { display: flex; align-items: center; justify-content: center; color: #bf0000; text-decoration: none; margin: 15px 0; font-weight: bold; font-size: 18px; }
        .links a i, .links a img { margin-right: 10px; width: 25px; text-align: center; }
        
        /* Music player and other styles remain the same... */
    </style>
</head>
<body>
    <video autoplay loop muted playsinline id="bg-video">
        <source src="15776218_2160_3840_30fps.mp4" type="video/mp4">
    </video>

    <div id="play-overlay" onclick="startAudio()"><div>Click to enter my site</div></div>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 5px;">
                <img src="ezgif-66e8ff165ceaaa3d.gif" style="width: 25px; height: 25px;">
                <h2 style="margin: 0; font-size: 24px; font-family: 'ElegantTypewriterBold';">Ash</h2>
                <img src="070199b6f1766875e20d8ecd23870852.gif" style="width: 25px; height: 25px;">
            </div>
            
            <p class="bio" id="bio-text"></p>

            <div class="links">
                </div>
        </div>
    </div>

    <script>
        // Start Everything
        function startAudio() {
            // ... (your existing audio play logic)
            overlay.style.opacity = "0";
            setTimeout(() => { overlay.style.display = "none"; }, 800);
            startTypewriter(); // Triggering the bio sequence
        }

        function startTypewriter() {
            const bioElement = document.getElementById('bio-text');
            const messages = [
                "This site was created by Ash, using HTML, JS and CSS.",
                "Click the logos to enter my socials"
            ];
            let messageIndex = 0;
            let charIndex = 0;

            function type() {
                if (messageIndex < messages.length) {
                    let currentMessage = messages[messageIndex];
                    if (charIndex < currentMessage.length) {
                        bioElement.innerHTML += currentMessage.charAt(charIndex);
                        charIndex++;
                        setTimeout(type, 60);
                    } else {
                        setTimeout(() => {
                            bioElement.innerHTML = "";
                            charIndex = 0;
                            messageIndex++;
                            type();
                        }, 2000);
                    }
                }
            }
            type();
        }
    </script>
</body>
</html>
