<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ash's Cavern</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @font-face { font-family: 'ElegantTypewriter'; src: url('ELEGANT TYPEWRITER Regular.ttf') format('truetype'); }
        @font-face { font-family: 'ElegantTypewriterBold'; src: url('ELEGANT TYPEWRITER Bold.ttf') format('truetype'); }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'ElegantTypewriter', sans-serif; overflow-x: hidden; background: black; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -999; object-fit: cover; }
        #play-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); color: white; display: flex; justify-content: center; align-items: center; z-index: 9999; cursor: pointer; transition: opacity 0.8s ease; }
        
        .container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; flex-direction: column; }
        .card { background: rgba(0, 0, 0, 0.2); padding: 25px; border-radius: 20px; text-align: center; color: #bf0000; width: 100%; max-width: 300px; }
        .pfp { width: 150px; height: 150px; border-radius: 50%; display: block; margin: 0 auto 15px auto; border: 2px solid #bf0000; }
        .name-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .header-name { font-family: 'ElegantTypewriterBold'; font-size: 32px; color: #bf0000; margin: 0; }
        .wing-icon { width: 30px; height: 30px; }
        .bio { font-weight: bold; font-size: 16px; margin-bottom: 20px; min-height: 3em; }
        .links a { display: flex; align-items: center; justify-content: center; color: #bf0000; text-decoration: none; margin: 15px 0; font-weight: bold; font-size: 18px; }
        .links a i { margin-right: 10px; width: 25px; text-align: center; }

        .music-player { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 350px; background: rgba(0, 0, 0, 0.85); padding: 8px 15px; border-radius: 40px; display: flex; align-items: center; gap: 12px; z-index: 1000; backdrop-filter: blur(10px); border: 1px solid #333; }
        .album-art img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
        .track-container { flex-grow: 1; overflow: hidden; }
        .track-info { color: white; font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; }
        .controls { display: flex; gap: 12px; color: #bf0000; font-size: 14px; }
        .controls button { background: none; border: none; color: #bf0000; cursor: pointer; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="15776218_2160_3840_30fps.mp4" type="video/mp4">
    </video>

    <div id="play-overlay" onclick="startAudio()"><div>Click to enter</div></div>

    <div class="container">
        <div class="card">
            <img src="26408.png" alt="PFP" class="pfp">
            <div class="name-row">
                <img src="ezgif-66e8ff165ceaaa3d.gif" class="wing-icon">
                <h2 class="header-name">Ash</h2>
                <img src="070199b6f1766875e20d8ecd23870852.gif" class="wing-icon">
            </div>
            <p class="bio" id="bio-text"></p>
            <div class="links">
                <a href="https://discord.com/users/6fo4"><i class="fab fa-discord"></i> Discord</a>
                <a href="https://soundcloud.com/ash-lives-under-an-rock"><i class="fab fa-soundcloud"></i> SoundCloud</a>
                <a href="https://www.last.fm/user/Ashy-geek"><i class="fab fa-lastfm"></i> Last.fm</a>
                <a href="https://www.roblox.com/users/4468232678/profile"><i class="fas fa-gamepad"></i> Roblox</a>
            </div>
        </div>
    </div>

    <div class="music-player">
        <div class="album-art"><img id="cover" src="" alt="Art"></div>
        <div class="track-container"><div class="track-info" id="song-title">Select a song</div></div>
        <div class="controls">
            <button onclick="prevSong()"><i class="fas fa-backward"></i></button>
            <button onclick="togglePlay()"><i id="play-pause" class="fas fa-play"></i></button>
            <button onclick="nextSong()"><i class="fas fa-forward"></i></button>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const playlist = [
            { title: "Say Something", src: "https://archive.org/download/saysomething-qorikardashian/Saysomething-qorikardashian.mp3", cover: "https://i.ibb.co/1fJ3Qgqp/Cover2.jpg" },
            { title: "Close My Eyes", src: "https://archive.org/download/close-my-eyes/Close_my_eyes.mp3", cover: "https://i.ibb.co/mCNNfGSH/Cover3.jpg" },
            { title: "I Hate You So Much", src: "https://archive.org/download/i-hate-you-so-much/I_hate_you_so_much.mp3", cover: "https://i.ibb.co/jPCT7468/Cover4.jpg" },
            { title: "Unhappy", src: "https://archive.org/download/unhappy_202606/unhappy.mp3", cover: "https://i.ibb.co/FbYVdkTp/Cover5.jpg" }
        ];

        let index = 0;
        const audio = document.getElementById('audio-player');
        const bio = document.getElementById('bio-text');
        const playBtn = document.getElementById('play-pause');
        
        function startAudio() {
            document.getElementById("play-overlay").style.opacity = "0";
            setTimeout(() => { document.getElementById("play-overlay").style.display = "none"; }, 800);
            loadSong(Math.floor(Math.random() * playlist.length));
            audio.play();
            playBtn.className = "fas fa-pause";
            typeWriter();
        }

        function typeWriter() {
            const messages = ["This site was created by Ash, using HTML, JS and CSS.", "Click the logos to enter my socials"];
            let mIdx = 0, cIdx = 0, deleting = false;
            function type() {
                let current = messages[mIdx];
                bio.innerText = deleting ? current.substring(0, cIdx--) : current.substring(0, cIdx++);
                let speed = deleting ? 50 : 100;
                if (!deleting && cIdx > current.length) { deleting = true; speed = 2000; }
                else if (deleting && cIdx === 0) { deleting = false; mIdx = (mIdx + 1) % messages.length; speed = 500; }
                setTimeout(type, speed);
            }
            type();
        }

        function loadSong(i) { index = i; document.getElementById('song-title').innerText = playlist[i].title; audio.src = playlist[i].src; document.getElementById('cover').src = playlist[i].cover; }
        function togglePlay() { if (audio.paused) { audio.play(); playBtn.className = "fas fa-pause"; } else { audio.pause(); playBtn.className = "fas fa-play"; } }
        function nextSong() { index = (index + 1) % playlist.length; loadSong(index); audio.play(); }
        function prevSong() { index = (index - 1 + playlist.length) % playlist.length; loadSong(index); audio.play(); }
    </script>
</body>
</html>
