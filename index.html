<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ash's Cavern</title>
    <link rel="icon" type="image/gif" href="6efe8a79d1667544b478964c52e05982.gif">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow-x: hidden; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; object-fit: cover; }
        #play-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); color: #bf0000; display: flex; justify-content: center; align-items: center; z-index: 9999; cursor: pointer; font-size: 24px; transition: opacity 0.8s ease; }
        .container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: rgba(0, 0, 0, 0.2); padding: 25px; border-radius: 20px; text-align: center; color: #bf0000; width: 100%; max-width: 300px; }
        .pfp-container { position: relative; width: 120px; height: 120px; margin: 0 auto 15px auto; }
        .pfp { width: 100%; height: 100%; border-radius: 50%; display: block; }
        .pfp-frame { position: absolute; top: -15px; left: -15px; width: 150px; height: 150px; pointer-events: none; }
        .verified { font-size: 12px; color: #800000; margin-bottom: 10px; font-weight: bold; }
        .bio { font-style: italic; margin-bottom: 20px; font-weight: bold; font-size: 16px; }
        .links a { display: flex; align-items: center; justify-content: center; color: #bf0000; text-decoration: none; margin: 15px 0; font-weight: bold; font-size: 18px; }
        .links a i, .links a img { margin-right: 10px; width: 25px; text-align: center; }

        /* New Music Player Styles */
        .music-player { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 50px; display: flex; align-items: center; gap: 10px; color: white; margin-top: 20px; border: 1px solid #bf0000; }
        .album-art img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .track-info { flex-grow: 1; text-align: left; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #bf0000; }
        .controls { display: flex; gap: 10px; }
        .controls button { background: none; border: none; color: #bf0000; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="15776218_2160_3840_30fps.mp4" type="video/mp4">
    </video>

    <iframe id="sc-widget" src="https://w.soundcloud.com/player/?url=https://soundcloud.com/ash-lives-under-an-rock/sets/ashs-cavern" width="100%" height="166" frameborder="no" style="display:none;"></iframe>

    <div id="play-overlay" onclick="startAudio()">
        <div>Click to enter</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="pfp-container">
                <img src="https://r2.guns.lol/a9aff29e-faa3-4791-9d68-c86c466f18d4.webp" alt="PFP" class="pfp">
                <img src="ezgif-46a49cacea44bc5f.gif" alt="Frame" class="pfp-frame">
            </div>
            
            <div style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 5px;">
                <img src="ezgif-66e8ff165ceaaa3d.gif" style="width: 25px; height: 25px;" alt="left-gif">
                <h2 style="margin: 0; font-size: 24px;">Ash</h2>
                <img src="070199b6f1766875e20d8ecd23870852.gif" style="width: 25px; height: 25px;" alt="right-gif">
            </div>
            
            <div class="verified"><i class="fas fa-check-circle"></i> Site created by Ash with HTML</div>
            <p class="bio">𝑻𝒆𝒓𝒓𝒐𝒓 𝒊𝒏 𝒓𝒆𝒔𝒐𝒏𝒂𝒏𝒄𝒆 𝒐𝒏 𝒕𝒐𝒑!</p>
            
            <div class="links">
                <a href="https://discord.com/users/6fo4"><i class="fab fa-discord"></i> Discord</a>
                <a href="https://soundcloud.com/ash-lives-under-an-rock"><i class="fab fa-soundcloud"></i> SoundCloud</a>
                <a href="https://www.last.fm/user/Ashy-geek"><i class="fab fa-lastfm"></i> Last.fm</a>
                <a href="https://www.roblox.com/users/4468232678/profile">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" style="width: 20px; height: 20px; filter: invert(10%) sepia(90%) saturate(6000%) hue-rotate(350deg) brightness(80%) contrast(110%);" alt="Roblox">
                    Roblox
                </a>
            </div>

            <div class="music-player">
                <div class="album-art"><img id="cover" src="" alt="Art"></div>
                <div class="track-info" id="song-title">Ash's Cavern Mix</div>
                <div class="controls">
                    <button onclick="prevSong()"><i class="fas fa-backward"></i></button>
                    <button onclick="togglePlay()"><i id="play-pause" class="fas fa-play"></i></button>
                    <button onclick="nextSong()"><i class="fas fa-forward"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://w.soundcloud.com/player/api.js"></script>
    <script>
        const widget = SC.Widget(document.getElementById('sc-widget'));
        const overlay = document.getElementById("play-overlay");

        function startAudio() {
            widget.play();
            overlay.style.opacity = "0";
            setTimeout(() => { overlay.style.display = "none"; }, 800);
        }

        widget.bind(SC.Widget.Events.READY, () => {
            const randomIndex = Math.floor(Math.random() * 33); 
            widget.skip(randomIndex);
        });

        widget.bind(SC.Widget.Events.PLAY, () => {
            widget.getCurrentSound((sound) => {
                document.getElementById('song-title').innerText = sound.title;
                document.getElementById('cover').src = sound.artwork_url ? sound.artwork_url.replace('-large', '-t500x500') : '';
            });
        });

        function togglePlay() {
            widget.toggle();
            widget.isPaused((paused) => {
                document.getElementById('play-pause').className = paused ? 'fas fa-play' : 'fas fa-pause';
            });
        }
        function nextSong() { widget.next(); }
        function prevSong() { widget.prev(); }
    </script>
</body>
</html>
