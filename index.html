<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>Ash's Cavern</title>
    <link rel="icon" type="image/gif" href="6efe8a79d1667544b478964c52e05982.gif">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
        }

        #play-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            color: #bf0000;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; cursor: pointer; font-size: 24px;
            transition: opacity 0.8s ease;
        }

        .container { display: flex; justify-content: center; align-items: center; height: 100vh; }

        .card {
            background: rgba(0, 0, 0, 0.2);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            color: #bf0000;
            width: 300px;
        }

        .pfp-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 15px auto;
        }

        .pfp { width: 100%; height: 100%; border-radius: 50%; display: block; }

        .pfp-frame {
            position: absolute;
            top: -15px;
            left: -15px;
            width: 150px;
            height: 150px;
            pointer-events: none;
        }

        .verified { font-size: 12px; color: #800000; margin-bottom: 10px; font-weight: bold; }
        .bio { font-style: italic; margin-bottom: 20px; font-weight: bold; font-size: 16px; }

        .links a {
            display: block;
            color: #bf0000;
            text-decoration: none;
            margin: 15px 0;
            font-weight: bold;
            font-size: 18px;
        }

        .links a i, .links a img { margin-right: 10px; width: 25px; text-align: center; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="15776218_2160_3840_30fps.mp4" type="video/mp4">
    </video>

    <audio id="bg-music" loop preload="auto">
        <source src="Saysomething_qorikardasian.mp3" type="audio/mpeg">
    </audio>

    <div id="play-overlay" onclick="startAudio()">
        <div>Click to enter</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="pfp-container">
                <img src="https://r2.guns.lol/a9aff29e-faa3-4791-9d68-c86c466f18d4.webp" alt="PFP" class="pfp">
                <img src="ezgif-46a49cacea44bc5f.gif" alt="Frame" class="pfp-frame">
            </div>
            
            <div style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 5px;">
                <img src="ezgif-66e8ff165ceaaa3d.gif" style="width: 25px; height: 25px;" alt="left-gif">
                <h2 style="margin: 0; font-size: 24px;">Ash</h2>
                <img src="070199b6f1766875e20d8ecd23870852.gif" style="width: 25px; height: 25px;" alt="right-gif">
            </div>
            
            <div class="verified">
                <i class="fas fa-check-circle"></i> Site created by Ash with HTML
            </div>
            
            <p class="bio">𝑻𝒆𝒓𝒓𝒐𝒓 𝒊𝒏 𝒓𝒆𝒔𝒐𝒏𝒂𝒏𝒄𝒆 𝒐𝒏 𝒕𝒐𝒑!</p>
            
            <div class="links">
                <a href="https://discord.com/users/6fo4"><i class="fab fa-discord"></i> Discord</a>
                <a href="https://soundcloud.com/ash-lives-under-an-rock"><i class="fab fa-soundcloud"></i> SoundCloud</a>
                <a href="https://www.last.fm/user/Ashy-geek"><i class="fab fa-lastfm"></i> Last.fm</a>
                <a href="https://www.roblox.com/users/4468232678/profile">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" style="width: 20px; height: 20px; vertical-align: middle; filter: invert(10%) sepia(90%) saturate(6000%) hue-rotate(350deg) brightness(80%) contrast(110%);" alt="Roblox">
                    Roblox
                </a>
            </div>
        </div>
    </div>

    <script>
        function startAudio() {
            const audio = document.getElementById("bg-music");
            const overlay = document.getElementById("play-overlay");
            audio.play().catch(e => console.log("Audio play blocked", e));
            overlay.style.opacity = "0";
            setTimeout(() => { overlay.style.display = "none"; }, 800);
        }
    </script>
</body>
</html>
