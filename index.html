<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ash's Cavern</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow-x: hidden; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; object-fit: cover; }
        #play-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); color: #bf0000; display: flex; justify-content: center; align-items: center; z-index: 9999; cursor: pointer; font-size: 24px; transition: opacity 0.8s ease; }
        .container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: rgba(0, 0, 0, 0.2); padding: 25px; border-radius: 20px; text-align: center; color: #bf0000; width: 100%; max-width: 300px; border: 1px solid #bf0000; }
        
        /* Player Styles */
        .music-player { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; color: white; margin-top: 20px; border: 1px solid #bf0000; }
        .album-art img { width: 100px; height: 100px; border-radius: 10px; object-fit: cover; border: 2px solid #bf0000; }
        .track-info { font-size: 14px; font-weight: bold; color: #bf0000; margin-bottom: 5px; }
        .controls { display: flex; gap: 20px; }
        .controls button { background: none; border: none; color: #bf0000; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="15776218_2160_3840_30fps.mp4" type="video/mp4">
    </video>

    <div id="play-overlay" onclick="startAudio()">
        <div>Click to enter</div>
    </div>

    <div class="container">
        <div class="card">
            <h2>Ash's Cavern</h2>
            
            <!-- Music Player -->
            <div class="music-player">
                <div class="album-art"><img id="cover" src="" alt="Art"></div>
                <div class="track-info" id="song-title">Loading...</div>
                <div class="controls">
                    <button onclick="prevSong()"><i class="fas fa-backward"></i></button>
                    <button onclick="togglePlay()"><i id="play-pause" class="fas fa-play"></i></button>
                    <button onclick="nextSong()"><i class="fas fa-forward"></i></button>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const playlist = [
            { title: "Sometimes", src: "Sometimes-mattyeux.mp3", cover: "Cover1.jpg" },
            { title: "I Hate You So Much", src: "I_hate_you_so_much.mp3", cover: "Cover2.jpg" },
            { title: "Say Something", src: "Saysomething_qorikardasian.mp3", cover: "Cover3.jpg" },
            { title: "Close My Eyes", src: "Close_my_eyes.mp3", cover: "Cover4.jpg" },
            { title: "Unhappy", src: "unhappy.mp3", cover: "Cover5.jpg" }
        ];

        let index = 0;
        const audio = document.getElementById('audio-player');
        const songTitle = document.getElementById('song-title');
        const coverArt = document.getElementById('cover');
        const playBtn = document.getElementById('play-pause');
        const overlay = document.getElementById("play-overlay");

        function loadSong(i) {
            songTitle.innerText = playlist[i].title;
            audio.src = playlist[i].src;
            coverArt.src = playlist[i].cover;
        }

        function startAudio() {
            audio.play();
            overlay.style.opacity = "0";
            setTimeout(() => { overlay.style.display = "none"; }, 800);
            playBtn.className = "fas fa-pause";
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.className = "fas fa-pause";
            } else {
                audio.pause();
                playBtn.className = "fas fa-play";
            }
        }

        function nextSong() {
            index = (index + 1) % playlist.length;
            loadSong(index);
            audio.play();
        }

        function prevSong() {
            index = (index - 1 + playlist.length) % playlist.length;
            loadSong(index);
            audio.play();
        }

        loadSong(index);
    </script>
</body>
</html>
