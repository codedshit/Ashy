<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ash's Cavern</title>
    <link rel="icon" type="image/gif" href="6efe8a79d1667544b478964c52e05982.gif">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @font-face { font-family: 'ElegantTypewriter'; src: url('ELEGANT TYPEWRITER Regular.ttf') format('truetype'); }
        @font-face { font-family: 'ElegantTypewriterBold'; src: url('ELEGANT TYPEWRITER Bold.ttf') format('truetype'); }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'ElegantTypewriter', sans-serif; background: black; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -999; object-fit: cover; }
        
        #play-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.7); color: white; display: flex; 
            justify-content: center; align-items: center; z-index: 9999; 
            cursor: pointer; font-family: 'ElegantTypewriter'; font-size: 24px;
        }

        .container { display: flex; justify-content: center; align-items: center; min-height: 85vh; padding: 20px; }
        .card { background: rgba(0, 0, 0, 0.4); padding: 25px; border-radius: 20px; text-align: center; color: #bf0000; width: 300px; }
        .pfp-container { position: relative; width: 120px; height: 120px; margin: 0 auto 15px auto; }
        .pfp { width: 100%; height: 100%; border-radius: 50%; }
        .pfp-frame { position: absolute; top: -15px; left: -15px; width: 150px; height: 150px; pointer-events: none; }
        
        .bio { font-family: 'ElegantTypewriter', monospace; font-size: 16px; color: #bf0000; min-height: 3em; margin: 15px 0; font-weight: bold; }
        .links a { display: flex; align-items: center; justify-content: center; color: #bf0000; text-decoration: none; margin: 15px 0; font-weight: bold; font-size: 18px; }
        .links a i, .links a img { margin-right: 10px; width: 25px; }

        .music-player { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 300px; background: rgba(0, 0, 0, 0.85); padding: 10px; border-radius: 20px; display: flex; align-items: center; gap: 10px; z-index: 1000; }
        .album-art img { width: 40px; height: 40px; border-radius: 8px; }
        .controls { display: flex; gap: 10px; color: #bf0000; }
        .controls button { background: none; border: none; color: #bf0000; cursor: pointer; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="15776218_2160_3840_30fps.mp4" type="video/mp4">
    </video>

    <div id="play-overlay" onclick="startAudio()"><div>Click to enter my site</div></div>

    <div class="container">
        <div class="card">
            <div class="pfp-container">
                <img src="https://r2.guns.lol/a9aff29e-faa3-4791-9d68-c86c466f18d4.webp" alt="PFP" class="pfp">
                <img src="ezgif-46a49cacea44bc5f.gif" alt="Frame" class="pfp-frame">
            </div>
            <h2 style="font-family: 'ElegantTypewriterBold'; margin: 0;">Ash</h2>
            <p class="bio" id="bio-text"></p>
            <div class="links">
                <a href="https://discord.com/users/6fo4"><i class="fab fa-discord"></i> Discord</a>
                <a href="https://soundcloud.com/ash-lives-under-an-rock"><i class="fab fa-soundcloud"></i> SoundCloud</a>
            </div>
        </div>
    </div>

    <div class="music-player">
        <div class="album-art"><img id="cover" src="https://i.ibb.co/1fJ3Qgqp/Cover2.jpg" alt="Art"></div>
        <div class="controls">
            <button onclick="togglePlay()"><i id="play-pause" class="fas fa-play"></i></button>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-pause');
        const overlay = document.getElementById("play-overlay");
        const bioElement = document.getElementById('bio-text');

        function startAudio() {
            overlay.style.opacity = "0";
            setTimeout(() => { overlay.style.display = "none"; }, 800);
            startTypewriter();
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); playBtn.className = "fas fa-pause"; }
            else { audio.pause(); playBtn.className = "fas fa-play"; }
        }

        function startTypewriter() {
            const messages = ["This site was created by Ash.", "Click the logos to enter my socials."];
            let msgIdx = 0, charIdx = 0;
            function type() {
                if (msgIdx < messages.length) {
                    if (charIdx < messages[msgIdx].length) {
                        bioElement.innerHTML += messages[msgIdx].charAt(charIdx);
                        charIdx++;
                        setTimeout(type, 60);
                    } else {
                        setTimeout(() => { bioElement.innerHTML = ""; charIdx = 0; msgIdx++; type(); }, 1500);
                    }
                }
            }
            type();
        }
    </script>
</body>
</html>
