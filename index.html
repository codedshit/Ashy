<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ash's Cavern</title>
    <link rel="icon" type="image/gif" href="6efe8a79d1667544b478964c52e05982.gif">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow-x: hidden; background: transparent !important; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -999; object-fit: cover; }
        #play-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); color: white; display: flex; justify-content: center; align-items: center; z-index: 9999; cursor: pointer; transition: opacity 0.8s ease; }
        
        .container { display: flex; justify-content: center; align-items: center; min-height: 85vh; padding: 20px; }
        .card { background: rgba(0, 0, 0, 0.2); padding: 25px; border-radius: 20px; text-align: center; color: #bf0000; width: 100%; max-width: 300px; }
        .pfp-container { position: relative; width: 120px; height: 120px; margin: 0 auto 15px auto; }
        .pfp { width: 100%; height: 100%; border-radius: 50%; display: block; }
        .pfp-frame { position: absolute; top: -15px; left: -15px; width: 150px; height: 150px; pointer-events: none; }
        .verified { font-size: 12px; color: #800000; margin-bottom: 10px; font-weight: bold; }
        .bio { font-style: italic; margin-bottom: 20px; font-weight: bold; font-size: 16px; }
        .links a { display: flex; align-items: center; justify-content: center; color: #bf0000; text-decoration: none; margin: 15px 0; font-weight: bold; font-size: 18px; }
        .links a i, .links a img { margin-right: 10px; width: 25px; text-align: center; }

        .music-player {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; background: rgba(0, 0, 0, 0.85);
            padding: 8px 15px; border-radius: 40px; display: flex; align-items: center;
            gap: 12px; border: 1px solid #333; z-index: 1000; backdrop-filter: blur(10px);
        }
        .album-art img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
        .track-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .track-info { color: white; font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .time-wrapper { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .time-bar { flex-grow: 1; height: 4px; background: #333; border-radius: 2px; cursor: pointer; }
        .progress { height: 100%; background: #bf0000; width: 0%; border-radius: 2px; transition: width 0.1s; }
        .time-text { font-size: 9px; color: #888; width: 25px; text-align: center; }

        .controls { display: flex; gap: 12px; color: #bf0000; font-size: 14px; align-items: center; }
        .controls button { background: none; border: none; color: #bf0000; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="15776218_2160_3840_30fps.mp4" type="video/mp4">
    </video>

    <div id="play-overlay" onclick="startAudio()"><div>Click to enter</div></div>

    <div class="container">
        <div class="card">
            <div class="pfp-container">
                <img src="https://r2.guns.lol/a9aff29e-faa3-4791-9d68-c86c466f18d4.webp" alt="PFP" class="pfp">
                <img src="ezgif-46a49cacea44bc5f.gif" alt="Frame" class="pfp-frame">
            </div>
            <div style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 5px;">
                <img src="ezgif-66e8ff165ceaaa3d.gif" style="width: 25px; height: 25px;">
                <h2 style="margin: 0; font-size: 24px;">Ash</h2>
                <img src="070199b6f1766875e20d8ecd23870852.gif" style="width: 25px; height: 25px;">
            </div>
            <div class="verified"><i class="fas fa-check-circle"></i> Site created by Ash with HTML</div>
            <p class="bio">𝑻𝒆𝒓𝒓𝒐𝒓 𝒊𝒏 𝒓𝒆𝒔𝒐𝒏𝒂𝒏𝒄𝒆 𝒐𝒏 𝒕𝒐𝒑!</p>
            <div class="links">
                <a href="https://discord.com/users/6fo4"><i class="fab fa-discord"></i> Discord</a>
                <a href="https://soundcloud.com/ash-lives-under-an-rock"><i class="fab fa-soundcloud"></i> SoundCloud</a>
                <a href="https://www.last.fm/user/Ashy-geek"><i class="fab fa-lastfm"></i> Last.fm</a>
                <a href="https://www.roblox.com/users/4468232678/profile">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" style="width: 20px; height: 20px; filter: invert(10%) sepia(90%) saturate(6000%) hue-rotate(350deg) brightness(80%) contrast(110%);" alt="Roblox">
                    Roblox
                </a>
            </div>
        </div>
    </div>

    <div class="music-player">
        <div class="album-art"><img id="cover" src="" alt="Art"></div>
        <div class="track-container">
            <div class="track-info" id="song-title">Select a song</div>
            <div class="time-wrapper">
                <span id="current-time" class="time-text">0:00</span>
                <div class="time-bar" onclick="seek(event)"><div id="progress" class="progress"></div></div>
                <span id="total-time" class="time-text">0:00</span>
            </div>
        </div>
        <div class="controls">
            <button onclick="prevSong()"><i class="fas fa-backward"></i></button>
            <button onclick="togglePlay()"><i id="play-pause" class="fas fa-play"></i></button>
            <button onclick="nextSong()"><i class="fas fa-forward"></i></button>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const playlist = [
            { title: "Say Something", src: "https://archive.org/download/saysomething-qorikardashian/Saysomething-qorikardashian.mp3", cover: "https://i.ibb.co/1fJ3Qgqp/Cover2.jpg" },
            { title: "Close My Eyes", src: "https://archive.org/download/close-my-eyes/Close_my_eyes.mp3", cover: "https://i.ibb.co/mCNNfGSH/Cover3.jpg" },
            { title: "I Hate You So Much", src: "https://archive.org/download/i-hate-you-so-much/I_hate_you_so_much.mp3", cover: "https://i.ibb.co/jPCT7468/Cover4.jpg" },
            { title: "Unhappy", src: "https://archive.org/download/unhappy_202606/unhappy.mp3", cover: "https://i.ibb.co/FbYVdkTp/Cover5.jpg" }
        ];

        let index = 0;
        const audio = document.getElementById('audio-player');
        const songTitle = document.getElementById('song-title');
        const coverArt = document.getElementById('cover');
        const playBtn = document.getElementById('play-pause');
        const overlay = document.getElementById("play-overlay");
        const progress = document.getElementById('progress');
        const curTime = document.getElementById('current-time');
        const durTime = document.getElementById('total-time');

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function loadSong(i) {
            songTitle.innerText = playlist[i].title;
            audio.src = playlist[i].src;
            coverArt.src = playlist[i].cover;
        }

        audio.addEventListener('timeupdate', () => {
            const { currentTime, duration } = audio;
            progress.style.width = `${(currentTime / duration) * 100}%`;
            curTime.innerText = formatTime(currentTime);
            durTime.innerText = formatTime(duration || 0);
        });

        audio.addEventListener('ended', nextSong);

        function startAudio() {
            index = Math.floor(Math.random() * playlist.length);
            loadSong(index);
            audio.play();
            overlay.style.opacity = "0";
            setTimeout(() => { overlay.style.display = "none"; }, 800);
            playBtn.className = "fas fa-pause";
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); playBtn.className = "fas fa-pause"; }
            else { audio.pause(); playBtn.className = "fas fa-play"; }
        }

        function nextSong() { index = (index + 1) % playlist.length; loadSong(index); audio.play(); }
        function prevSong() { index = (index - 1 + playlist.length) % playlist.length; loadSong(index); audio.play(); }
        function seek(e) {
            const width = e.target.clientWidth;
            const clickX = e.offsetX;
            audio.currentTime = (clickX / width) * audio.duration;
        }
    </script>
</body>
</html>
